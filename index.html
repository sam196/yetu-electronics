<!-- Admin Panel Section - Only visible when logged in -->
<section id="admin-panel" class="admin-panel" style="display: none;">
    <div class="container">
        <div class="admin-header">
            <h3><i class="fas fa-cog"></i> Admin Panel</h3>
            <button id="close-admin" class="close-admin"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="add-product">Add Product</button>
            <button class="admin-tab" data-tab="manage-products">Manage Products</button>
            <button class="admin-tab" data-tab="upload-images">Upload Images</button>
        </div>
        
        <!-- Add Product Tab -->
        <div id="add-product" class="admin-tab-content active">
            <h4>Add New Product</h4>
            <form id="add-product-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Product Name:</label>
                    <input type="text" id="product-name" required>
                </div>
                
                <div class="form-group">
                    <label>Category:</label>
                    <select id="product-category">
                        <option value="phones">Phones</option>
                        <option value="laptops">Laptops</option>
                        <option value="tvs">TVs</option>
                        <option value="audio">Audio</option>
                        <option value="accessories">Accessories</option>
                        <option value="gaming">Gaming</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (KSh):</label>
                        <input type="number" id="product-price" required>
                    </div>
                    <div class="form-group">
                        <label>Old Price (KSh):</label>
                        <input type="number" id="product-old-price" placeholder="Optional">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Product Image:</label>
                    <input type="file" id="product-image" accept="image/*">
                    <div id="image-preview" class="image-preview"></div>
                </div>
                
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="product-description" rows="3"></textarea>
                </div>
                
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="product-flash"> Flash Sale Item
                    </label>
                </div>
                
                <button type="submit" class="submit-btn">Add Product</button>
            </form>
        </div>
        
        <!-- Manage Products Tab -->
        <div id="manage-products" class="admin-tab-content">
            <h4>Manage Products</h4>
            <div id="products-list" class="products-list"></div>
        </div>
        
        <!-- Upload Images Tab -->
        <div id="upload-images" class="admin-tab-content">
            <h4>Upload Multiple Images</h4>
            <form id="bulk-upload-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Select Images (max 5MB each):</label>
                    <input type="file" id="bulk-images" accept="image/*" multiple>
                    <div id="bulk-preview" class="bulk-preview"></div>
                </div>
                <button type="submit" class="submit-btn">Upload Images</button>
            </form>
            <div id="uploaded-images" class="uploaded-images"></div>
        </div>
    </div>
</section>

<!-- Admin Login Button -->
<button id="admin-login-btn" class="admin-login-btn">
    <i class="fas fa-lock"></i> Admin
</button>
